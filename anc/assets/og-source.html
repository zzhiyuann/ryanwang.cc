<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG image — ANC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #0b0d12; }

  .og {
    width: 1200px; height: 630px;
    position: relative;
    background:
      radial-gradient(900px 500px at 80% 20%, rgba(245, 185, 66, 0.13) 0%, transparent 60%),
      radial-gradient(700px 400px at 10% 100%, rgba(102, 209, 158, 0.06) 0%, transparent 60%),
      #0b0d12;
    color: #e6e9ef;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
  }

  /* subtle grid */
  .og::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .og-inner {
    position: relative; z-index: 1;
    padding: 56px 72px 52px;
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 16px;
  }

  .og-mark {
    display: flex; align-items: center; gap: 14px;
    font-weight: 700; font-size: 18px; letter-spacing: 0.18em;
    color: #ffffff;
  }
  .og-mark .diamond {
    width: 26px; height: 26px;
    border: 2px solid #f5b942;
    transform: rotate(45deg);
  }

  .og-center { display: flex; flex-direction: column; justify-content: center; }
  .og-headline {
    font-size: 56px; line-height: 1.08; letter-spacing: -0.02em;
    font-weight: 800;
    color: #ffffff;
    max-width: 1020px;
  }
  .og-headline .accent { color: #f5b942; display: block; }

  .og-tag {
    font-size: 21px; color: #98a0b0; font-weight: 500;
    letter-spacing: -0.005em;
    max-width: 940px;
    margin-top: 22px;
  }

  .og-foot {
    display: flex; align-items: center; justify-content: space-between;
    color: #6b7385; font-size: 16px; font-family: 'JetBrains Mono', monospace;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 22px;
  }
  .og-foot .right { color: #f5b942; font-weight: 500; }
</style>
</head>
<body>
<div class="og">
  <div class="og-inner">
    <div class="og-mark">
      <span class="diamond"></span>
      <span>ANC</span>
    </div>

    <div class="og-center">
      <div class="og-headline">
        Devin is a contractor.<br>
        Codex is a tool.
        <span class="accent">ANC is the company they work for.</span>
      </div>
      <div class="og-tag">
        One founder. Full org chart. Every seat filled by AI that remembers, grows, and self-heals.
      </div>
    </div>

    <div class="og-foot">
      <div>github.com/zzhiyuann/anc · MIT</div>
      <div class="right">Agent Native Company</div>
    </div>
  </div>
</div>
</body>
</html>
