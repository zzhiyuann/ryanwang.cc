---
layout: default
---

<article class="page-shell grid-item-post">
  <header class="page-header">
    <p class="page-eyebrow">Post</p>
    <h1>{{ page.title }}</h1>
    <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
  </header>

  <div class="post-content">
  {{ content }}
  </div>
</article>
