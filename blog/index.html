<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Ryan Wang</title>
  <meta name="description" content="Technical deep dives on AI agent infrastructure, MCP ecosystem, and building in public.">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9651;</text></svg>">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --bg-card: #18181b;
      --border: #27272a;
      --border-hover: #3f3f46;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #22d3ee;
      --accent-hover: #06b6d4;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace;
      --max-width: 720px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --bg-card: #ffffff;
        --border: #e4e4e7;
        --border-hover: #d4d4d8;
        --text: #09090b;
        --text-secondary: #52525b;
        --text-muted: #a1a1aa;
        --accent: #0891b2;
        --accent-hover: #0e7490;
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; }

    header {
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    header nav a {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-left: 1.5rem;
    }
    header nav a:hover { color: var(--text); }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 3rem;
    }

    .posts-list {
      display: flex;
      flex-direction: column;
    }

    .post-item {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .post-date {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-shrink: 0;
      min-width: 6rem;
    }

    .post-info h3 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .post-info h3 a { color: var(--text); }
    .post-info h3 a:hover { color: var(--accent); }

    .post-info p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .empty-state {
      padding: 4rem 2rem;
      border: 1px dashed var(--border);
      border-radius: 10px;
      text-align: center;
    }

    .empty-state h2 {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .empty-state p {
      color: var(--text-muted);
      font-size: 0.9rem;
      max-width: 400px;
      margin: 0 auto;
    }

    footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    footer p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .post-item { flex-direction: column; gap: 0.25rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <a href="/" class="logo">ryanwang.cc</a>
      <nav>
        <a href="/#projects">Projects</a>
        <a href="/#research">Research</a>
        <a href="/blog/">Blog</a>
        <a href="/#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Blog</h1>
    <p class="subtitle">Technical deep dives on agent infrastructure, MCP ecosystem, and building in public.</p>

    <div class="empty-state">
      <h2>Coming soon</h2>
      <p>First posts are in the pipeline. Subscribe via RSS or check back soon.</p>
    </div>

    <!--
    When adding blog posts, use this template:

    <div class="posts-list">
      <div class="post-item">
        <span class="post-date">2026-04-01</span>
        <div class="post-info">
          <h3><a href="/blog/post-slug.html">Post Title Here</a></h3>
          <p>One-line description of the post.</p>
        </div>
      </div>
    </div>

    Each blog post should be a standalone HTML file in /blog/ using the
    post template at /blog/_template.html
    -->
  </main>

  <footer>
    <div class="container">
      <p><a href="/">ryanwang.cc</a> &middot; &copy; 2026 Ryan Wang</p>
    </div>
  </footer>

</body>
</html>
